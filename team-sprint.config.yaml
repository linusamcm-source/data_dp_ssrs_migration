# team-sprint config — SSRS→PBIRS migration toolkit
# Single-stack repo: one PowerShell module (RsMigration/).

plan_path: docs/plans/ssrs-pbirs-toolkit-1.md
target_branch: develop
coverage_threshold: 90
coverage_mode: new

# --- Commands -------------------------------------------------------------
# PowerShell modules (Pester/PSScriptAnalyzer/RS modules) are installed
# CurrentUser-scope, hence visible in every worktree without per-tree setup.
commands:
  # No separate typecheck step — PSScriptAnalyzer is the static gate, run
  # inside the test command. `true` is a no-op exiting 0.
  typecheck: "true"
  lint: "true"
  # The PowerShell gate: Pester (>=90% coverage) + PSScriptAnalyzer.
  test: "just qg-ps"
  # External coverage gate DISABLED: 90% is enforced INSIDE the qg-ps recipe
  # (Pester JaCoCo), not by an external coverage.xml reader.
  coverage: "true"

# --- Fleet ----------------------------------------------------------------
# general-purpose handles PowerShell (no powershell-specialist agent exists).
crew: on
engineer_agent: general-purpose
test_writer_agent: general-purpose

# --- Knobs ----------------------------------------------------------------
graphify: on            # greenfield; repomix is enough for recon here
push_on_merge: false
adversarial_iterations: 3
review_fix_iterations: 3
